name: OPA Policy Check

on:
  push:
    branches:
      - main

jobs:
  policy-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Conftest (no manual download needed)
      - name: Setup Conftest
        uses: instrumenta/conftest-action@v0.3.0

      # 3. Verify installation (optional but recommended)
      - name: Verify Conftest
        run: conftest --version

      # 4. Run policy check
      - name: Run OPA Policy Check
        run: conftest test config.json --policy policy/